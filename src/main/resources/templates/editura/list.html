<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
<meta charset="UTF-8" />
    <title>Listă edituri</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Listă edituri</h1>
<p><a th:href="@{/edituri/nou}">Adaugă editură</a></p>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nume</th>
        <th>Acțiuni</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="editura : ${edituri}">
        <td th:text="${editura.id}"></td>
        <td th:text="${editura.nume}"></td>
        <td>
            <a th:href="@{'/edituri/editare/' + ${editura.id}}">Editează</a> |
            <a th:href="@{'/edituri/stergere/' + ${editura.id}}">Șterge</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
