<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
<meta charset="UTF-8" />
    <title>Listă categorii</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Listă categorii</h1>
<p><a th:href="@{/categorii/nou}">Adaugă categorie</a></p>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nume</th>
        <th>Descriere</th>
        <th>Acțiuni</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="categorie : ${categorii}">
        <td th:text="${categorie.id}"></td>
        <td th:text="${categorie.nume}"></td>
        <td th:text="${categorie.descriere}"></td>
        <td>
            <a th:href="@{'/categorii/editare/' + ${categorie.id}}">Editează</a> |
            <a th:href="@{'/categorii/stergere/' + ${categorie.id}}">Șterge</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
