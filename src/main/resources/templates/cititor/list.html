<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
<meta charset="UTF-8" />
    <title>Listă cititori</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Listă cititori</h1>
<p><a th:href="@{/cititori/nou}">Adaugă cititor</a></p>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nume</th>
        <th>Prenume</th>
        <th>Email</th>
        <th>Telefon</th>
        <th>Data înscrierii</th>
        <th>Tip cititor</th>
        <th>Acțiuni</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cititor : ${cititori}">
        <td th:text="${cititor.id}"></td>
        <td th:text="${cititor.nume}"></td>
        <td th:text="${cititor.prenume}"></td>
        <td th:text="${cititor.email}"></td>
        <td th:text="${cititor.telefon}"></td>
        <td th:text="${cititor.dataInscriere}"></td>
        <td th:text="${cititor.tipCititor}"></td>
        <td>
            <a th:href="@{'/cititori/editare/' + ${cititor.id}}">Editează</a> |
            <a th:href="@{'/cititori/stergere/' + ${cititor.id}}">Șterge</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
