<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
<meta charset="UTF-8" />
    <title>Listă împrumuturi</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Listă împrumuturi</h1>
<p><a th:href="@{/imprumuturi/nou}">Adaugă împrumut</a></p>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Cititor</th>
        <th>Carte</th>
        <th>Data împrumut</th>
        <th>Data scadență</th>
        <th>Data returnare</th>
        <th>Status</th>
        <th>Observații</th>
        <th>Acțiuni</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="imprumut : ${imprumuturi}">
        <td th:text="${imprumut.id}"></td>
        <td th:text="${imprumut.cititor.nume} + ' ' + ${imprumut.cititor.prenume}"></td>
        <td th:text="${imprumut.carte.titlu}"></td>
        <td th:text="${imprumut.dataImprumut}"></td>
        <td th:text="${imprumut.dataScadenta}"></td>
        <td th:text="${imprumut.dataReturnare}"></td>
        <td th:text="${imprumut.status}"></td>
        <td th:text="${imprumut.observatii}"></td>
        <td>
            <a th:href="@{'/imprumuturi/editare/' + ${imprumut.id}}">Editează</a> |
            <a th:href="@{'/imprumuturi/stergere/' + ${imprumut.id}}">Șterge</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
